<div class="pdf-container">
  @if (pdfSrc() && totalPages() === 0) {
    <div style="display: none;">
      <pdf-viewer
        [src]="pdfSrc()!"
        (after-load-complete)="onPdfLoaded($event)"
        [render-text]="false">
      </pdf-viewer>
    </div>
    <div class="loading-msg">Se calculează paginile...</div>
  }

  @if (pdfSrc() && totalPages() > 0) {
    <div class="pdf-grid">
      @for (i of [].constructor(totalPages()); track $index; let idx = $index) {
        <div class="page-item" (click)="togglePage(idx)">
          <div class="pdf-wrapper">
            <pdf-viewer
              [src]="pdfSrc()!"
              [page]="idx + 1"
              [render-text]="false"
              [original-size]="false"
              [show-all]="false"
              [fit-to-page]="true"
              style="width: 100%; height: 100%; display: block;"
            ></pdf-viewer>

            @if (!pageStatuses()[idx]) {
              <div class="ignored-overlay">
                <svg class="diagonal-line">
                  <line x1="0" y1="0" x2="100%" y2="100%" />
                  <line x1="100%" y1="0" x2="0%" y2="100%" />
                </svg>
                <div class="status-tag">IGNORAT</div>
              </div>
            }
          </div>
          <div class="page-info">Pagina {{ idx + 1 }}</div>
        </div>
      }
    </div>
  }
</div>
