<div>
@if (pdfSrc()) {
  <div class="pdf-grid">
  @for (i of [].constructor(totalPages()); track idx; let idx = $index) {
      <div class="page-item" (click)="togglePage(idx)">
    
    <div class="pdf-wrapper">
      <pdf-viewer
        [src]="pdfSrc()!"
        [page]="idx + 1"
        [render-text]="false"
        [original-size]="false"
        [show-all]="false"
        (after-load-complete)="idx === 0 ? onPdfLoaded($event) : null"
        style="width: 150px; height: 200px; display: block;"
      ></pdf-viewer>

      <!-- Overlay pentru pagini ignorate -->
       @if (!pageStatuses()[idx]){
      <div class="ignored-overlay">
        <svg class="diagonal-line">
          <line x1="0" y1="0" x2="100%" y2="100%" />
          <line x1="100%" y1="0" x2="0" y2="100%" />
        </svg>
        <div class="status-tag">IGNORAT</div>
      </div>
      }
    </div>

    <div class="page-info">Pagina {{ idx + 1 }}</div>
  </div>
}
</div>
}
</div>
