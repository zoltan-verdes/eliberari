<div class="pdf-container">
  @if (localPdfSrc()) {
    <pdf-viewer
      [src]="localPdfSrc()!"
      [render-text]="false"
      [original-size]="false"
      [show-all]="true"
      [fit-to-page]="true"
      style="width: 100%; height: 800px; display: block;"
    ></pdf-viewer>
  } @else {
    <div class="empty-state">
      <p>Selectați un document pentru previzualizare.</p>
    </div>
  }
</div>
