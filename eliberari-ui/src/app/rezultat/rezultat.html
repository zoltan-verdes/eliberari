<div class="results-container">
  <table class="tabel-cereri">
    <thead>
      <tr>
        <th>Nr. Cerere</th>
        <th>Data</th>
        <th>CI</th>
        <th>CIM</th>
        <th>CC</th>
      </tr>
    </thead>
    <tbody>
      @for (item of date; track $index) {
        <tr>
          <td>{{ item.numar || '' }}</td>
          <td>{{ item.data || '' }}</td>
          <td class="pagini">{{ formatStatus(item.ci) }}</td>
          <td class="pagini">{{ formatStatus(item.cim) }}</td>
          <td class="pagini">{{ formatStatus(item.cc) }}</td>
        </tr>
      }
    </tbody>
  </table>
</div>
